// Generate tools menu
function generateToolsMenu(currentToolId) {
    const container = document.getElementById('toolsMenuContent');
    if (!container) return;
    
    container.innerHTML = TOOLS.map(tool => {
        const isActive = tool.id === currentToolId;
        const href = `/tools/${tool.id}`;
        return `<a href="${href}" class="nav-link${isActive ? ' active' : ''}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="${tool.icon}"></path>
            </svg>
            ${tool.name}
        </a>`;
    }).join('');
}

// Initialize navbar
function initNavbar() {
    // Get current path
    const path = window.location.pathname;
    
    // Extract current tool ID from path
    let currentToolId = null;
    const toolMatch = path.match(/\/tools\/([^\/]+)/);
    if (toolMatch) {
        currentToolId = toolMatch[1];
    }
    
    // Generate tools menu
    generateToolsMenu(currentToolId);
    
    // Set active state for current page
    const navLinks = document.querySelectorAll('.nav-link[data-page]');
    navLinks.forEach(link => {
        const page = link.dataset.page;
        if (path === `/${page}` || path === `/${page}/`) {
            link.classList.add('active');
        }
    });
}

// Mobile menu toggle
function toggleMobileMenu() {
    const navbarLinks = document.getElementById('navbarLinks');
    if (navbarLinks) {
        navbarLinks.classList.toggle('mobile-open');
    }
}

// Initialize on DOM ready
document.addEventListener('DOMContentLoaded', initNavbar);
</script>
